name: PR check

on:
    # push:
    #     branches: [main]
    pull_request:
        branches: [main]
        types: 
            - opened
            - synchronize

jobs:
    print-branch:
        runs-on: ubuntu-latest

        steps:
            - name: PR branch name print
              run: |
                  echo "PR check running for branch: $GITHUB_HEAD_REF"
