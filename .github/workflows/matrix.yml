name: strategy matrix

on:
    push:
        branches: [main]

jobs:
    py-version-print:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: True
            matrix: 
                python-version: ['3.1','3.10','3.12']
                os: ['ubuntu-latest','windows-latest']
                exclude:
                    - os: 'windows-latest'
                      python-version: '3.10'
        steps:
          - name: Set up Python ${{ matrix.python-version }}
            uses: actions/setup-python@v5
            with:
                python-version: ${{ matrix.python-version }} # Install specific version

          - name: print python version
            run: |
                echo "Installed Python version is : "
                python -V