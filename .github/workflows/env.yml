name: Environment Variable

on:
    push:
        branches: [main]

env:
    APP_NAME: myapp

jobs:
    access-env-var:
        env:
            ENVIRONMENT: staging
        runs-on: ubuntu-latest

        steps:
            - name: print env
              env:
                VERSION: 1.0.0
              run: |
                    echo "print workflow env: $APP_NAME"
                    echo "print job env: $ENVIRONMENT"
                    echo "print steps env: $VERSION"
            - name: accessing github variable
              run: |
                    echo "print commit sha using shell syntax: $GITHUB_SHA"
                    echo "print commit sha using github context: ${{ github.sha }}"
                    echo "print actor using shell syntax : $GITHUB_ACTOR"
                    echo "print actor using github context : ${{ github.actor }}"