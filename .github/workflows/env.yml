name: Environment Variable

on:
    push:
        branches: [main]

env:
    APP_NAME: myapp

jobs:
    access-env-var:
        env:
            ENVIRONMENT: staging
        runs-on: ubuntu-latest

        steps:
            - name: print env
              env:
                VERSION: 1.0.0
              run: |
                    echo "print workflow env: $APP_NAME"
                    echo "print workflow env: $ENVIRONMENT"
                    echo "print workflow env: $VERSION"